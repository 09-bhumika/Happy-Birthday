<!DOCTYPE html>
<html>
<head>
<title>Birthday Surprise 💖</title>

<style>
body {
    text-align: center;
    font-family: 'Segoe UI';
    background: linear-gradient(to right, #ffe4ec, #ffc1cc);
    overflow: hidden;
}

h1 {
    margin-top: 30px;
    color: #b30059;
}

/* Hint */
.hint {
    font-size: 18px;
    color: #660033;
    margin-top: 10px;
    animation: bounce 1s infinite;
}

@keyframes bounce {
    0% { transform: translateY(0); }
    100% { transform: translateY(10px); }
}

/* Cake container */
.cake {
    position: relative;
    margin: 80px auto;
    width: 220px;
}

/* Layers */
.layer {
    height: 60px;
    border-radius: 20px;
    margin: 5px 0;
    box-shadow: 0 8px 15px rgba(0,0,0,0.2);
}

/* Different colors */
.layer1 { background: #ff85a2; }
.layer2 { background: #ffb3c6; }
.layer3 { background: #ffd6e0; }

/* Cream drip effect */
.drip {
    position: absolute;
    width: 100%;
    height: 20px;
    background: white;
    top: 55px;
    border-radius: 0 0 20px 20px;
}

/* Candle */
.candle {
    position: absolute;
    top: -70px;
    left: 50%;
    transform: translateX(-50%);
    cursor: pointer;
}

.stick {
    width: 10px;
    height: 50px;
    background: white;
    margin: auto;
}

.flame {
    width: 16px;
    height: 22px;
    background: radial-gradient(circle, #ffcc00, orange);
    border-radius: 50%;
    margin: auto;
    animation: flicker 0.15s infinite alternate;
}

@keyframes flicker {
    from { transform: scale(1); }
    to { transform: scale(1.3); }
}

/* Smoke */
.smoke {
    width: 10px;
    height: 20px;
    background: gray;
    border-radius: 50%;
    margin: auto;
    animation: smokeUp 1s forwards;
}

@keyframes smokeUp {
    from { transform: translateY(0); opacity: 1; }
    to { transform: translateY(-50px); opacity: 0; }
}

/* Message */
#message {
    margin-top: 40px;
    font-size: 34px;
    color: #800040;
    font-weight: bold;
}

/* Hearts */
.heart {
    position: fixed;
    bottom: -20px;
    font-size: 22px;
    animation: floatUp linear infinite;
}

@keyframes floatUp {
    from { transform: translateY(0); }
    to { transform: translateY(-900px); }
}
</style>
</head>

<body>

<h1>🎂 Birthday Surprise 🎂</h1>
<div class="hint">👇 Click the candle to blow it</div>

<div class="cake">

    <!-- Candle -->
    <div class="candle" onclick="blowCandle()">
        <div id="flame" class="flame"></div>
        <div class="stick"></div>
    </div>

    <!-- Cake Layers -->
    <div class="layer layer3"></div>
    <div class="layer layer2"></div>
    <div class="layer layer1"></div>

</div>

<div id="message"></div>

<!-- Confetti -->
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>

function blowCandle() {
    document.querySelector(".hint").style.display = "none";

    let flame = document.getElementById("flame");
    flame.classList.remove("flame");
    flame.classList.add("smoke");

    confetti({
        particleCount: 180,
        spread: 120,
        origin: { y: 0.6 }
    });

    let text = "💖 Happy Bday My Baby 💖";
    let i = 0;

    function typeEffect() {
        if (i < text.length) {
            document.getElementById("message").innerHTML += text.charAt(i);
            i++;
            setTimeout(typeEffect, 70);
        }
    }

    setTimeout(typeEffect, 500);
}

/* Hearts */
function createHearts() {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "💖";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.animationDuration = (3 + Math.random() * 3) + "s";

    document.body.appendChild(heart);
    setTimeout(() => heart.remove(), 6000);
}

setInterval(createHearts, 500);

</script>

</body>
</html>
